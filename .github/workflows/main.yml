name: Generate Pacman Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Animation with Pacman Theme
        uses: Platane/snk@v3
        with:
          github_user_name: hasti-m7
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FFF300&color_dots=#FF0000,#FFB8FF,#00FFFF,#FFB852

      - name: Push to GitHub Page
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
