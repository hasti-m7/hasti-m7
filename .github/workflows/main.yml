name: Generate OG Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Retro Arcade Board
        uses: lowlighter/metrics@latest
        with:
          filename: github-pacman.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          config_order: languages
          
          # This triggers the classic arcade animation overlay
          config_twemojis: yes
          config_theme: dark
